name: client-build

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-15
            target: macos-arm64
            script: build:macos-arm64
            artifact: aimdware-router-macos-arm64
          - os: macos-15
            target: macos-x64
            script: build:macos-x64
            artifact: aimdware-router-macos-x64
          - os: ubuntu-latest
            target: linux-arm64
            script: build:linux-arm64
            artifact: aimdware-router-linux-arm64
          - os: ubuntu-latest
            target: linux-x64
            script: build:linux-x64
            artifact: aimdware-router-linux-x64

    defaults:
      run:
        working-directory: llm-client

    steps:
      - uses: actions/checkout@v7

      - uses: oven-sh/setup-bun@v2

      - run: bun install --frozen-lockfile

      - run: bun run typecheck

      - run: bun test

      - run: bun run ${{ matrix.script }}

      - name: Package release asset
        if: startsWith(github.ref, 'refs/tags/v')
        run: tar -C dist -czf "dist/aimdware-router-${GITHUB_REF_NAME}-${{ matrix.target }}.tar.gz" "${{ matrix.artifact }}"

      - name: Upload release asset
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release view "${GITHUB_REF_NAME}" >/dev/null 2>&1 || gh release create "${GITHUB_REF_NAME}" --verify-tag --title "${GITHUB_REF_NAME}" --generate-notes
          gh release upload "${GITHUB_REF_NAME}" "dist/aimdware-router-${GITHUB_REF_NAME}-${{ matrix.target }}.tar.gz" --clobber

      - uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact }}
          path: llm-client/dist/${{ matrix.artifact }}
          if-no-files-found: error
